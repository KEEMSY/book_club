name: backend

# Scope the workflow to backend concerns: changes under backend/ or this
# workflow file. Mobile-only PRs should not trigger a backend run.
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

# Queue-level dedupe: a new push on the same ref cancels the prior run so
# reviewers always see the latest commit's status without queue buildup.
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-type:
    name: lint & type
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv (installs Python per pyproject requires-python — 3.12)
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          # Cache keyed on the lockfile so dependency changes bust cleanly.
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies (lockfile-enforced)
        run: uv sync --locked

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy app

  test:
    name: test (pytest + alembic upgrade)
    runs-on: ubuntu-latest

    # Pin service images to the same versions Compose uses so CI and local
    # development exercise identical backing stores.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bookclub
          POSTGRES_PASSWORD: bookclub
          POSTGRES_DB: bookclub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookclub -d bookclub"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    # CI-only values — real secrets live in Fly.io/Neon/Upstash and are
    # never materialised here. JWT_SECRET is a throwaway string used only
    # to satisfy pydantic-settings validation during the test run.
    env:
      DATABASE_URL: postgresql+asyncpg://bookclub:bookclub@localhost:5432/bookclub
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-fake-jwt-secret-do-not-use

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv (installs Python per pyproject requires-python — 3.12)
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies (lockfile-enforced)
        run: uv sync --locked

      - name: Apply migrations (alembic upgrade head)
        run: uv run alembic upgrade head

      - name: pytest
        run: uv run pytest -q

  docker-build:
    name: docker build (production target)
    runs-on: ubuntu-latest
    # Only exercise the production image on PR — push-to-main already ran on
    # the merge commit and we don't publish images from this workflow yet.
    if: github.event_name == 'pull_request'
    # Build step doesn't need the backend working directory default.
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: false
          load: false
          tags: bookclub-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
