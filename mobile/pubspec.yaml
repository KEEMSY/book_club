name: book_club
description: "Book Club mobile app (Flutter)."
publish_to: 'none'

version: 0.0.1-dev+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Models / serialization annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # HTTP
  dio: ^5.7.0
  # Pinned below 4.5 — retrofit 4.5+ introduced `Parser.DartMappable`, which
  # retrofit_generator 9.7.x does not handle exhaustively. Bump both together
  # when we upgrade.
  retrofit: '>=4.4.1 <4.5.0'

  # Secure storage (JWT)
  flutter_secure_storage: ^9.2.4

  # Social login SDKs (M1 · auth). Kakao SDK user module covers OAuth login
  # via KakaoTalk + fallback web account flow. Apple SDK covers iOS native
  # Sign in with Apple (Android hidden — backend route still exists but UI
  # button is iOS-only).
  kakao_flutter_sdk_user: ^1.9.7
  sign_in_with_apple: ^6.1.4

  # i18n / formatting
  intl: ^0.19.0

  # Typography — Airbnb design system. Cereal VF is proprietary, so we
  # substitute with two google_fonts families tuned for a Korean 20–30대 여성
  # reading-app audience: Playfair Display (editorial serif — hero / display
  # roles) and Inter (humanist sans — UI / body). Fonts are fetched at runtime.
  google_fonts: ^6.2.1

  # Remote book cover loading (M2 · book feature). Network image cache +
  # progressive placeholder on top of dio. The Book Club backend returns
  # `cover_url` from Naver/Kakao directly, so we need HTTP range-friendly
  # cached images with graceful fallbacks when a book record has no cover.
  cached_network_image: ^3.4.1

  # Rating stars (M2 · review modal). Chosen over rolling a custom star row
  # because the package renders cleanly inside our Airbnb-toned modal and
  # lets us swap the empty/filled colors to Rausch without losing haptics.
  flutter_rating_bar: ^4.0.1

  # Android foreground service host for the reading timer (M3 · Task 3.11).
  # Registers the "독서 중" persistent notification so Android doesn't kill the
  # Dart isolate while the user is reading outside the app. iOS uses the
  # wall-clock resume-recompute path instead (see `timer_notifier.dart`).
  flutter_background_service: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  retrofit_generator: ^9.1.5
  riverpod_generator: ^2.6.3

  # Lint plugins (Riverpod-aware)
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

# Dependency override — analyzer_plugin 0.12.0 (transitive via custom_lint
# / riverpod_lint) references APIs that conflict with analyzer 7.6. 0.13.0
# fixes the Element2 split-namespace issue. Revisit once custom_lint 0.8+ is
# compatible with freezed 2.x (pubspec block shows 0.8+ forces freezed 3.x).
dependency_overrides:
  analyzer_plugin: ^0.13.0

flutter:
  uses-material-design: true
